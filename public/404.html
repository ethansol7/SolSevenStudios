<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sol Seven Studios</title>
    <script>
      (function () {
        var canonicalOrigin = 'https://SolSevenStudios.com';
        var githubPrefix = '/SolSevenStudios';
        var path = window.location.pathname;

        if (window.location.hostname === 'ethansol7.github.io' && path.indexOf(githubPrefix) === 0) {
          var nextPath = path.slice(githubPrefix.length) || '/';
          window.location.replace(canonicalOrigin + nextPath + window.location.search + window.location.hash);
          return;
        }

        sessionStorage.setItem('solseven.redirect', window.location.href);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
